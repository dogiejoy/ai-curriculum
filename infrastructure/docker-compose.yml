services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-curriculum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: ai_curriculum
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d ai_curriculum"]
      interval: 10s
      timeout: 5s
      retries: 5
